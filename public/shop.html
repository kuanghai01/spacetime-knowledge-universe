<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分商城 - 时空知识宇宙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 1.5em; }
        .back-btn {
            background: rgba(255,255,255,0.1); border: none; color: #e0e0e0;
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .asset-bar {
            display: flex; gap: 15px; padding: 15px 20px;
            background: rgba(255,255,255,0.05); border-radius: 12px;
            margin: 20px 0;
        }
        .asset-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 1.1em; font-weight: bold;
        }
        .asset-icon { font-size: 1.3em; }

        .level-bar {
            margin: 15px 0;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .level-info {
            display: flex; justify-content: space-between; margin-bottom: 8px;
            font-size: 0.9em;
        }
        .progress-bg {
            background: rgba(255,255,255,0.1); border-radius: 10px;
            height: 12px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .tabs {
            display: flex; gap: 10px; margin: 20px 0;
        }
        .tab {
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            background: rgba(255,255,255,0.05); border: 1px solid transparent;
            transition: all 0.2s;
        }
        .tab.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }
        .tab:hover { background: rgba(255,255,255,0.1); }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }
        .shop-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column;
        }
        .shop-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .shop-card.rarity-common { border-color: #95a5a6; }
        .shop-card.rarity-uncommon { border-color: #2ecc71; }
        .shop-card.rarity-rare { border-color: #3498db; }
        .shop-card.rarity-epic { border-color: #9b59b6; }
        .shop-card.rarity-legendary {
            border-color: #e67e22;
            background: linear-gradient(135deg, rgba(230,126,34,0.1), rgba(255,255,255,0.05));
        }

        .shop-card-emoji { font-size: 2.5em; margin-bottom: 10px; }
        .shop-card-name {
            font-size: 1.1em; font-weight: bold; margin-bottom: 5px;
        }
        .shop-card-rarity {
            font-size: 0.75em; padding: 2px 8px; border-radius: 4px;
            display: inline-block; margin-bottom: 8px;
        }
        .rarity-common .shop-card-rarity { background: rgba(149,165,166,0.3); }
        .rarity-uncommon .shop-card-rarity { background: rgba(46,204,113,0.3); }
        .rarity-rare .shop-card-rarity { background: rgba(52,152,219,0.3); }
        .rarity-epic .shop-card-rarity { background: rgba(155,89,182,0.3); }
        .rarity-legendary .shop-card-rarity { background: rgba(230,126,34,0.3); }

        .shop-card-desc {
            font-size: 0.85em; color: #aaa; flex-grow: 1;
            margin-bottom: 12px; line-height: 1.4;
        }
        .shop-card-footer {
            display: flex; justify-content: space-between; align-items: center;
        }
        .shop-card-price {
            font-size: 0.9em; font-weight: bold;
            color: #f39c12;
        }
        .shop-card-buy {
            padding: 6px 14px; border-radius: 6px; border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; cursor: pointer; font-size: 0.85em;
            transition: opacity 0.2s;
        }
        .shop-card-buy:hover { opacity: 0.8; }
        .shop-card-buy:disabled {
            background: #555; cursor: not-allowed; opacity: 0.5;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        .inventory-item {
            background: rgba(255,255,255,0.05);
            border-radius: 8px; padding: 15px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .inventory-item:hover { background: rgba(255,255,255,0.1); }
        .inventory-item.equipped {
            border-color: #667eea;
            background: rgba(102,126,234,0.2);
        }
        .inventory-item-emoji { font-size: 2em; }
        .inventory-item-name { font-size: 0.8em; margin-top: 5px; }
        .inventory-item-equipped {
            font-size: 0.7em; color: #667eea; margin-top: 3px;
        }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #2ecc71; color: white; padding: 12px 24px;
            border-radius: 8px; z-index: 1000;
            animation: fadeInOut 3s ease;
        }
        .toast.error { background: #e74c3c; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 积分商城</h1>
            <button class="back-btn" onclick="location.href='/'">← 返回学习</button>
        </div>

        <div class="asset-bar">
            <div class="asset-item"><span class="asset-icon">🪙</span> <span id="assetGold">0</span></div>
            <div class="asset-item"><span class="asset-icon">🥈</span> <span id="assetSilver">0</span></div>
            <div class="asset-item"><span class="asset-icon">🟤</span> <span id="assetCopper">0</span></div>
        </div>

        <div class="level-bar">
            <div class="level-info">
                <span>Lv.<span id="userLevel">1</span> <span id="userTitle">初学者</span></span>
                <span><span id="currentExp">0</span> / <span id="nextLevelExp">100</span> EXP</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill" id="levelProgress" style="width: 0%"></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('shop')">🏪 商城</div>
            <div class="tab" onclick="showTab('inventory')">🎒 背包</div>
            <div class="tab" onclick="showTab('companions')">🐲 伙伴</div>
        </div>

        <div id="shopTab">
            <div class="tabs" style="margin-top: 0;">
                <div class="tab active" onclick="filterShop('all')">全部</div>
                <div class="tab" onclick="filterShop('companion')">🐲 伙伴</div>
                <div class="tab" onclick="filterShop('cosmetic')">👑 装扮</div>
                <div class="tab" onclick="filterShop('power_up')">📖 道具</div>
                <div class="tab" onclick="filterShop('privilege')">🌟 特权</div>
            </div>
            <div class="shop-grid" id="shopGrid"></div>
        </div>

        <div id="inventoryTab" style="display: none;">
            <h3 style="margin-bottom: 15px;">🎒 我的背包</h3>
            <div class="inventory-grid" id="inventoryGrid"></div>
        </div>

        <div id="companionsTab" style="display: none;">
            <h3 style="margin-bottom: 15px;">🐲 我的伙伴</h3>
            <p style="color: #aaa; margin-bottom: 15px;">选择一个伙伴装备，它将陪伴你的学习之旅</p>
            <div class="inventory-grid" id="companionsGrid"></div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentTab = 'shop';
        let currentFilter = 'all';
        let shopItems = [];
        let userInventory = [];

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('shopTab').style.display = tab === 'shop' ? 'block' : 'none';
            document.getElementById('inventoryTab').style.display = tab === 'inventory' ? 'block' : 'none';
            document.getElementById('companionsTab').style.display = tab === 'companions' ? 'block' : 'none';

            if (tab === 'inventory' || tab === 'companions') {
                loadInventory();
            }
        }

        function filterShop(category) {
            currentFilter = category;
            renderShop();
        }

        async function loadAssets() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/assets/`);
                const data = await res.json();
                document.getElementById('assetCopper').textContent = data.copper;
                document.getElementById('assetSilver').textContent = data.silver;
                document.getElementById('assetGold').textContent = data.gold;
                document.getElementById('userLevel').textContent = data.level;
                document.getElementById('userTitle').textContent = data.level_title;

                const levelRes = await fetch(`${API_BASE}/api/v1/assets/level`);
                const levelData = await levelRes.json();
                document.getElementById('currentExp').textContent = levelData.current_exp;
                document.getElementById('nextLevelExp').textContent = levelData.next_level_exp;
                document.getElementById('levelProgress').style.width = levelData.percent + '%';
            } catch (e) {
                console.log('加载资产失败，使用默认值');
            }
        }

        async function loadShopItems() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/shop/items`);
                const data = await res.json();
                shopItems = data.items;
                renderShop();
            } catch (e) {
                console.log('加载商品失败');
            }
        }

        function renderShop() {
            const grid = document.getElementById('shopGrid');
            let items = shopItems;
            if (currentFilter !== 'all') {
                items = items.filter(i => i.category === currentFilter);
            }

            grid.innerHTML = items.map(item => `
                <div class="shop-card rarity-${item.rarity}">
                    <div class="shop-card-emoji">${item.emoji}</div>
                    <div class="shop-card-name">${item.name}</div>
                    <div class="shop-card-rarity">${rarityText(item.rarity)}</div>
                    <div class="shop-card-desc">${item.description}</div>
                    <div class="shop-card-footer">
                        <div class="shop-card-price">🟤${item.price}</div>
                        <button class="shop-card-buy" onclick="buyItem('${item.id}')">购买</button>
                    </div>
                </div>
            `).join('');
        }

        function rarityText(rarity) {
            const texts = {
                common: '⬜ 普通',
                uncommon: '🟩 优秀',
                rare: '🟦 稀有',
                epic: '🟪 史诗',
                legendary: '🟧 传说',
            };
            return texts[rarity] || rarity;
        }

        async function buyItem(itemId) {
            try {
                const res = await fetch(`${API_BASE}/api/v1/shop/buy/${itemId}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message);
                    loadAssets();
                    loadInventory();
                } else {
                    showToast(data.message || data.detail || '购买失败', true);
                }
            } catch (e) {
                showToast('购买失败', true);
            }
        }

        async function loadInventory() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/shop/inventory`);
                const data = await res.json();
                userInventory = data.inventory;
                renderInventory();
            } catch (e) {
                console.log('加载背包失败');
            }
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            const companionsGrid = document.getElementById('companionsGrid');

            const itemsHtml = userInventory.length === 0
                ? '<p style="color: #666; grid-column: 1/-1; text-align: center;">背包空空如也，去商城逛逛吧！</p>'
                : userInventory.map(item => `
                    <div class="inventory-item" onclick="useItem('${item.id}')">
                        <div class="inventory-item-emoji">${item.emoji}</div>
                        <div class="inventory-item-name">${item.name}</div>
                    </div>
                `).join('');

            grid.innerHTML = itemsHtml;

            // 伙伴列表
            const companions = userInventory.filter(i => i.category === 'companion');
            const companionsHtml = companions.length === 0
                ? '<p style="color: #666; grid-column: 1/-1; text-align: center;">还没有伙伴，去商城领养吧！</p>'
                : companions.map(item => `
                    <div class="inventory-item" onclick="equipItem('${item.id}')">
                        <div class="inventory-item-emoji">${item.emoji}</div>
                        <div class="inventory-item-name">${item.name}</div>
                    </div>
                `).join('');

            companionsGrid.innerHTML = companionsHtml;
        }

        async function equipItem(itemId) {
            try {
                const res = await fetch(`${API_BASE}/api/v1/shop/equip/${itemId}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message);
                    loadInventory();
                } else {
                    showToast(data.detail || '装备失败', true);
                }
            } catch (e) {
                showToast('装备失败', true);
            }
        }

        function useItem(itemId) {
            const item = userInventory.find(i => i.id === itemId);
            if (item) {
                showToast(`${item.emoji} ${item.name} - 道具在学习的征途中会自动生效！`);
            }
        }

        // 初始化
        loadAssets();
        loadShopItems();
    </script>
</body>
</html>
