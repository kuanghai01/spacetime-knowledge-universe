<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时空知识宇宙 - 学习助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #e94560, #f39c12, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header .subtitle {
            color: #888;
            font-size: 14px;
        }

        /* 学科选择器 */
        .subject-selector {
            display: flex;
            gap: 10px;
            padding: 15px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .subject-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .subject-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #e94560;
        }

        .subject-btn.active {
            background: linear-gradient(135deg, #e94560, #f39c12);
            color: white;
            border-color: transparent;
        }

        .subject-btn .icon {
            margin-right: 6px;
        }

        /* 聊天区 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 400px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #e94560, #f39c12);
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #4a90d9, #5e60ce);
        }

        .message .content {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.assistant .content {
            background: rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 4px;
        }

        .message.user .content {
            background: rgba(233, 69, 96, 0.3);
            border-bottom-right-radius: 4px;
        }

        .message .agent-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 6px;
            display: inline-block;
        }

        .message .agent-badge.history {
            background: rgba(233, 69, 96, 0.3);
            color: #ff6b6b;
        }

        .message .agent-badge.physics {
            background: rgba(74, 144, 217, 0.3);
            color: #4a90d9;
        }

        .message .agent-badge.math {
            background: rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        /* 经验值提示 */
        .exp-badge {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #f39c12, #e94560);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.5s;
            pointer-events: none;
            z-index: 100;
        }

        .exp-badge.show {
            opacity: 1;
            animation: floatUp 1.5s ease forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -90%) scale(1); }
        }

        /* 输入区 */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .input-area input:focus {
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.08);
        }

        .input-area input::placeholder {
            color: #666;
        }

        .send-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #e94560, #f39c12);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 12px;
            color: #666;
        }

        .status-bar .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.connected { background: #2ecc71; }
        .status-dot.disconnected { background: #e74c3c; }
        .status-dot.connecting { background: #f39c12; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 建议问题 */
        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 10px 0;
        }

        .suggestion-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            background: transparent;
            color: #999;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            border-color: #e94560;
            color: #e94560;
        }

        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(30, 30, 60, 0.9);
            padding: 8px 16px; border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        .nav-btn {
            background: transparent; border: none; color: #aaa;
            padding: 6px 14px; border-radius: 12px; cursor: pointer;
            font-size: 0.9em; transition: all 0.2s;
        }
        .nav-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }

        /* 模式选择 */
        .mode-selector {
            display: flex; gap: 8px; margin: 12px 0;
            justify-content: center;
        }
        .mode-btn {
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            font-size: 0.85em; transition: all 0.2s;
            border: 2px solid #3a3a5c; background: transparent; color: #aaa;
        }
        .mode-btn:hover { border-color: #4a90d9; color: #4a90d9; }
        .mode-btn.active {
            border-color: #4a90d9; background: #4a90d9; color: white;
        }

        /* 题目选项 */
        .option-btn { position: relative; }
        .option-btn:hover { border-color: #4a90d9 !important; background: #1e2a4a !important; }
        .option-btn.selected { border-color: #4a90d9 !important; background: #1e2a4a !important; }

        /* 反馈样式 */
        .feedback-correct { border-left: 4px solid #2ecc71; }
        .feedback-wrong { border-left: 4px solid #e74c3c; }

        /* 经验徽章动画 */
        @keyframes expFloat {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(-5px); }
            100% { opacity: 0; transform: translateY(-15px); }
        }

        /* 调试面板 */
        .debug-panel {
            position: fixed; top: 10px; right: 10px;
            background: rgba(0,0,0,0.8); color: #0f0;
            padding: 8px 12px; border-radius: 6px;
            font-family: monospace; font-size: 11px;
            z-index: 999; max-width: 200px;
            display: none;
        }
        .debug-panel.show { display: block; }
    </style>
</head>
<body>
    <div class="debug-panel" id="debugPanel">
        <div>🔧 调试信息</div>
        <div id="debugContent">等待连接...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🌌 时空知识宇宙</h1>
            <p class="subtitle">游戏化沉浸式 AI 学习系统</p>
        </div>

        <div class="subject-selector">
            <button class="subject-btn active" data-subject="history">
                <span class="icon">📚</span>历史
            </button>
            <button class="subject-btn" data-subject="physics">
                <span class="icon">⚗️</span>物理
            </button>
            <button class="subject-btn" data-subject="math">
                <span class="icon">📐</span>数学
            </button>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="guided">🎯 引导学习</button>
            <button class="mode-btn" data-mode="hybrid">🔀 混合模式</button>
            <button class="mode-btn" data-mode="free_qa">💬 自由问答</button>
        </div>

        <div class="status-bar">
            <span>
                <span class="status-dot connecting" id="statusDot"></span>
                <span id="statusText">正在连接...</span>
            </span>
            <span id="userInfo">用户: 游客</span>
        </div>

        <div class="chat-container" id="chatContainer">
            <!-- 消息将动态插入 -->
        </div>

        <div class="suggestions" id="suggestions">
            <button class="suggestion-btn" data-question="秦始皇是哪一年统一六国的？">秦始皇统一六国</button>
            <button class="suggestion-btn" data-question="光的反射定律是什么？">光的反射</button>
            <button class="suggestion-btn" data-question="解方程 2x+5=13">解方程</button>
            <button class="suggestion-btn" data-question="帮我做个光的实验">虚拟实验</button>
            <button class="suggestion-btn" data-question="演示三角形内角和">三角形的角</button>
            <button class="suggestion-btn" data-question="为什么秦朝会灭亡？">🔗 因果分析</button>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入你的问题..." />
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="location.href='/'">💬 学习</button>
        <button class="nav-btn" onclick="location.href='/app/shop.html'">🏪 商城</button>
    </div>

    <div class="exp-badge" id="expBadge">+10 经验</div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const expBadge = document.getElementById('expBadge');
        const suggestionsDiv = document.getElementById('suggestions');

        let ws = null;
        let currentSubject = 'history';
        let currentMode = 'guided';  // guided | free_qa | hybrid
        let sessionActive = false;
        let currentQuestion = null;
        let userId = 'user_' + Math.random().toString(36).substr(2, 9);
        let debugLog = [];

        // ===== 调试日志 =====
        function debug(msg) {
            const time = new Date().toLocaleTimeString();
            debugLog.push(`[${time}] ${msg}`);
            if (debugLog.length > 50) debugLog.shift();
            const el = document.getElementById('debugContent');
            if (el) el.innerHTML = debugLog.slice(-8).join('<br>');
            console.log('[DEBUG]', msg);
        }

        // 显示/隐藏调试面板 (双击页面)
        document.addEventListener('dblclick', () => {
            document.getElementById('debugPanel').classList.toggle('show');
        });

        // ===== 连接 WebSocket =====
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/v1/learn/ws/${currentSubject}?user_id=${userId}`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                debug('WebSocket 已连接');
                statusDot.className = 'status-dot connected';
                statusText.textContent = '已连接 - ' + getSubjectName(currentSubject);
                sendBtn.disabled = false;
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                debug('收到消息: type=' + data.type);
                handleMessage(data);
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = '已断开';
                sendBtn.disabled = true;
                sessionActive = false;
                setTimeout(connectWS, 5000);
            };

            ws.onerror = () => {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = '连接错误';
            };
        }

        // ===== 消息处理 =====
        function handleMessage(data) {
            switch (data.type) {
                case 'session_started':
                    sessionActive = true;
                    debug('会话开始: ' + data.session_id + ' 模式: ' + data.mode);
                    addAgentMessage(data.content || '会话已开始', currentSubject);
                    break;

                case 'question':
                    currentQuestion = data;
                    debug('收到题目: ' + data.question_id + ' 类型: ' + data.question_type);
                    showQuestion(data);
                    break;

                case 'feedback':
                    debug('收到反馈: correct=' + data.correct + ' score=' + data.score);
                    showFeedback(data);
                    currentQuestion = null;
                    break;

                case 'hint':
                    addAgentMessage('💡 ' + data.content, currentSubject);
                    break;

                case 'free_answer':
                    addAgentMessage(data.content, currentSubject, data.related_knowledge);
                    if (data.exp_gained) showExpBadge(data.exp_gained);
                    break;

                case 'session_summary':
                    showSessionSummary(data);
                    sessionActive = false;
                    break;

                case 'system':
                    addAgentMessage(data.content, currentSubject);
                    break;

                case 'task_suggest':
                    addAgentMessage(`📋 **建议任务**: ${data.task.title}`, currentSubject);
                    break;

                case 'task_completed':
                    addAgentMessage('🎉 任务完成！' + (data.exp_gained ? ` +${data.exp_gained} 经验` : ''), currentSubject);
                    if (data.exp_gained) showExpBadge(data.exp_gained);
                    break;

                case 'error':
                    addAgentMessage('⚠️ ' + data.content, currentSubject);
                    break;

                default:
                    console.log('未知消息类型:', data);
            }
        }

        // ===== 显示题目 =====
        function showQuestion(q) {
            debug('显示题目: ' + q.question_id + ' 选项数: ' + (q.options ? q.options.length : 0));
            const badgeClass = currentSubject === 'physics' ? 'physics' : currentSubject === 'math' ? 'math' : 'history';
            const badgeText = currentSubject === 'physics' ? '物先生' : currentSubject === 'math' ? '数先生' : '史博士';

            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'question-' + q.question_id;

            let html = `<div class="avatar">${getSubjectIcon(currentSubject)}</div>`;
            html += '<div class="content">';
            html += `<span class="agent-badge ${badgeClass}">${badgeText}</span><br>`;
            html += formatMarkdown(q.content);

            // 选项按钮
            if (q.options && q.options.length > 0) {
                html += '<div class="question-options" style="margin-top:12px;display:flex;flex-direction:column;gap:8px;">';
                const letters = ['A', 'B', 'C', 'D'];
                q.options.forEach((opt, i) => {
                    html += `<button class="option-btn" data-letter="${letters[i]}" style="padding:10px 16px;border:2px solid #3a3a5c;border-radius:8px;background:#1a1a2e;color:#e0e0e0;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;" onmouseover="this.style.borderColor='#4a90d9';this.style.background='#1e2a4a';" onmouseout="this.style.borderColor='#3a3a5c';this.style.background='#1a1a2e';" onclick="submitAnswer('${letters[i]}')">`;
                    html += `<strong>${letters[i]}.</strong> ${escapeHtml(opt)}`;
                    html += '</button>';
                });
                html += '</div>';
            }

            // 操作按钮
            html += '<div class="question-actions" style="margin-top:12px;display:flex;gap:8px;">';
            html += '<button class="action-btn" onclick="requestHint()" style="padding:6px 14px;border:1px solid #555;border-radius:6px;background:transparent;color:#aaa;cursor:pointer;font-size:13px;">💡 提示</button>';
            if (q.question_type === 'short_answer' || q.question_type === 'fill_blank') {
                html += '<span style="color:#666;font-size:13px;line-height:32px;">或在下方输入答案</span>';
            }
            html += '</div>';

            if (q.knowledge_point) {
                html += `<br><small style="color:#666;">📎 关联: ${escapeHtml(q.knowledge_point)}</small>`;
            }

            html += '</div>';
            div.innerHTML = html;
            chatContainer.appendChild(div);
            scrollToBottom();

            // 更新输入框提示
            if (q.question_type === 'short_answer' || q.question_type === 'fill_blank') {
                messageInput.placeholder = '输入你的答案...';
            } else {
                messageInput.placeholder = '点击上方选项回答...';
            }
        }

        // ===== 显示反馈 =====
        function showFeedback(data) {
            const div = document.createElement('div');
            div.className = 'message ' + (data.correct ? 'feedback-correct' : 'feedback-wrong');
            div.style.background = data.correct ? '#1a3a1a' : '#3a1a1a';
            div.style.borderRadius = '12px';
            div.style.padding = '12px 16px';
            div.style.margin = '8px 0';

            let html = `<div style="font-size:15px;margin-bottom:6px;">${formatMarkdown(data.feedback)}</div>`;
            if (data.explanation) {
                html += `<div style="font-size:13px;color:#ccc;margin-top:8px;padding-top:8px;border-top:1px solid #333;">${formatMarkdown(data.explanation)}</div>`;
            }
            if (data.exp_gained) {
                html += `<div style="margin-top:8px;font-size:13px;color:#ffd700;">+${data.exp_gained} 经验</div>`;
                showExpBadge(data.exp_gained);
            }

            // 下一题按钮
            html += '<div style="margin-top:12px;">';
            html += '<button onclick="nextQuestion()" style="padding:8px 20px;border:none;border-radius:8px;background:#4a90d9;color:white;cursor:pointer;font-size:14px;">下一题 →</button>';
            html += '</div>';

            div.innerHTML = html;
            chatContainer.appendChild(div);
            scrollToBottom();

            // 恢复输入框
            messageInput.placeholder = '输入你的问题或答案...';
        }

        // ===== 显示会话总结 =====
        function showSessionSummary(data) {
            const div = document.createElement('div');
            div.className = 'message';
            div.style.background = '#1a1a3e';
            div.style.borderRadius = '12px';
            div.style.padding = '16px 20px';
            div.style.margin = '12px 0';
            div.style.textAlign = 'center';

            let html = '<div style="font-size:18px;margin-bottom:12px;">📊 学习总结</div>';
            html += `<div style="display:flex;justify-content:center;gap:20px;margin-bottom:12px;">`;
            html += `<div><div style="font-size:24px;font-weight:bold;color:#4a90d9;">${data.total_questions}</div><div style="font-size:12px;color:#888;">总题数</div></div>`;
            html += `<div><div style="font-size:24px;font-weight:bold;color:#2ecc71;">${data.correct_count}</div><div style="font-size:12px;color:#888;">正确</div></div>`;
            html += `<div><div style="font-size:24px;font-weight:bold;color:#ffd700;">${data.accuracy}%</div><div style="font-size:12px;color:#888;">正确率</div></div>`;
            html += `<div><div style="font-size:24px;font-weight:bold;color:#e74c3c;">${data.exp_gained}</div><div style="font-size:12px;color:#888;">经验</div></div>`;
            html += '</div>';
            html += '<button onclick="startNewSession()" style="padding:10px 24px;border:none;border-radius:8px;background:#4a90d9;color:white;cursor:pointer;font-size:15px;">开始新一轮学习</button>';

            div.innerHTML = html;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        // ===== 提交答案 =====
        function submitAnswer(answer) {
            debug('提交答案: ' + answer + ' | sessionActive=' + sessionActive + ' | ws=' + (ws ? ws.readyState : 'null'));
            if (!sessionActive || !ws || ws.readyState !== WebSocket.OPEN) {
                debug('无法提交: 连接未就绪');
                addAgentMessage('⚠️ 连接未就绪，请稍后再试', currentSubject);
                return;
            }

            // 显示用户答案
            addUserMessage(answer);

            // 发送答案
            ws.send(JSON.stringify({
                type: 'answer',
                content: answer,
            }));
            
            // 禁用输入防止重复提交
            messageInput.disabled = true;
            sendBtn.disabled = true;
            setTimeout(() => {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }, 1000);
        }

        // ===== 下一题 =====
        function nextQuestion() {
            if (!sessionActive || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'next_question' }));
        }

        // ===== 请求提示 =====
        function requestHint() {
            if (!sessionActive || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'hint' }));
        }

        // ===== 自由提问 =====
        function askFreeQuestion(question) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            addUserMessage(question);
            ws.send(JSON.stringify({
                type: 'free_question',
                content: question,
            }));
        }

        // ===== 开始新会话 =====
        function startNewSession() {
            debug('开始新会话: ' + currentMode);
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                debug('无法开始会话: WebSocket未连接');
                return;
            }
            ws.send(JSON.stringify({
                type: 'start_session',
                mode: currentMode,
            }));
        }

        // ===== 结束会话 =====
        function endSession() {
            if (!sessionActive || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'end_session' }));
        }

        // ===== 添加用户消息 =====
        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="avatar">👤</div>
                <div class="content">${escapeHtml(text)}</div>
            `;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        // ===== 添加 Agent 消息 =====
        function addAgentMessage(text, subject, related) {
            const badgeClass = subject === 'physics' ? 'physics' : subject === 'math' ? 'math' : 'history';
            const badgeText = subject === 'physics' ? '物先生' : subject === 'math' ? '数先生' : '史博士';

            const div = document.createElement('div');
            div.className = 'message assistant';

            let html = `<div class="avatar">${getSubjectIcon(subject)}</div>`;
            html += '<div class="content">';
            html += `<span class="agent-badge ${badgeClass}">${badgeText}</span><br>`;
            html += formatMarkdown(text);

            if (related && related.length > 0) {
                html += '<br><br><small style="color: #888;">📎 相关知识点: ';
                html += related.map(r => `<span style="color: #4a90d9;">${escapeHtml(r.title || r)}</span>`).join(', ');
                html += '</small>';
            }

            html += '</div>';
            div.innerHTML = html;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        // ===== 工具函数 =====
        function getSubjectName(s) {
            return s === 'history' ? '历史' : s === 'physics' ? '物理' : s === 'math' ? '数学' : s;
        }

        function getSubjectIcon(s) {
            return s === 'physics' ? '⚗️' : s === 'math' ? '📐' : '📖';
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 100);
        }

        function showExpBadge(exp) {
            expBadge.textContent = `+${exp} 经验`;
            expBadge.classList.remove('show');
            void expBadge.offsetWidth;
            expBadge.classList.add('show');
        }

        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ===== 发送消息 =====
        function sendMessage() {
            const text = messageInput.value.trim();
            debug('发送消息: ' + text + ' | sessionActive=' + sessionActive + ' | currentQuestion=' + (currentQuestion ? currentQuestion.question_id : 'null'));
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            if (sessionActive && currentQuestion) {
                // 当前有题目等待回答
                submitAnswer(text);
            } else if (currentMode === 'free_qa' || !sessionActive) {
                // 自由问答模式
                askFreeQuestion(text);
            } else {
                // 混合模式：无题目时自由提问
                askFreeQuestion(text);
            }

            messageInput.value = '';
        }

        // ===== 事件监听 =====
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ===== 学科切换 =====
        document.querySelectorAll('.subject-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSubject = btn.dataset.subject;

                // 清空聊天
                chatContainer.innerHTML = '';
                sessionActive = false;
                currentQuestion = null;

                // 重新连接
                if (ws) ws.close();
                connectWS();
            });
        });

        // ===== 模式切换 =====
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;

                // 清空聊天并开始新会话
                chatContainer.innerHTML = '';
                sessionActive = false;
                currentQuestion = null;

                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'start_session',
                        mode: currentMode,
                    }));
                }
            });
        });

        // ===== 建议问题 =====
        document.querySelectorAll('.suggestion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const question = btn.dataset.question;
                if (question && ws && ws.readyState === WebSocket.OPEN) {
                    if (sessionActive && currentMode !== 'free_qa') {
                        submitAnswer(question);
                    } else {
                        askFreeQuestion(question);
                    }
                }
            });
        });

        // ===== 启动 =====
        connectWS();

        // 自动开始引导学习（延迟等待连接）
        setTimeout(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'start_session',
                    mode: currentMode,
                }));
            }
        }, 1000);
    </script>
</body>
</html>
